<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Hệ Mặt Trời 3D</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    #sol {
      position: relative;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      min-height: 500px;
      overflow: hidden;
      background: #000;
      font-family: 'SF Pro Display', system-ui, -apple-system, sans-serif
    }

    #c {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      user-select: none
    }

    #ptog {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 30;
      width: 40px;
      height: 40px;
      background: rgba(0, 6, 22, .82);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(70, 140, 255, .3);
      border-radius: 11px;
      color: #5a9eff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: .2s;
      user-select: none;
      -webkit-tap-highlight-color: transparent
    }

    #ptog:hover {
      background: rgba(0, 12, 45, .9);
      border-color: rgba(70, 140, 255, .55)
    }

    #ptog:active {
      transform: scale(.92)
    }

    #panel {
      position: absolute;
      top: 10px;
      right: 60px;
      width: 200px;
      max-height: calc(100% - 20px);
      overflow-y: auto;
      overflow-x: hidden;
      background: rgba(0, 5, 18, .9);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(55, 125, 255, .18);
      border-radius: 15px;
      padding: 14px 13px 12px;
      color: #b0ccec;
      z-index: 20;
      transition: opacity .24s cubic-bezier(.4, 0, .2, 1), transform .24s cubic-bezier(.4, 0, .2, 1);
      transform-origin: top right
    }

    #panel::-webkit-scrollbar {
      width: 3px
    }

    #panel::-webkit-scrollbar-thumb {
      background: rgba(55, 125, 255, .22);
      border-radius: 3px
    }

    #panel.hide {
      opacity: 0;
      transform: scale(.93) translateX(10px);
      pointer-events: none
    }

    #panel-title {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #4a8fff;
      margin: 0 0 9px;
      text-align: center
    }

    #lang-row {
      display: flex;
      gap: 5px;
      margin-bottom: 10px
    }

    .lbtn {
      flex: 1;
      padding: 5px 2px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .6px;
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(55, 125, 255, .15);
      border-radius: 6px;
      color: #3a5880;
      cursor: pointer;
      transition: .15s;
      -webkit-tap-highlight-color: transparent
    }

    .lbtn.act {
      background: rgba(40, 105, 255, .18);
      border-color: rgba(40, 105, 255, .4);
      color: #5a9eff
    }

    .lbtn:hover:not(.act) {
      background: rgba(255, 255, 255, .08);
      color: #7898b8
    }

    .cr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px
    }

    .cl {
      font-size: 10px;
      color: #5878a0
    }

    .tog {
      position: relative;
      width: 30px;
      height: 16px;
      cursor: pointer;
      flex-shrink: 0
    }

    .tog input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute
    }

    .tt {
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, .10);
      border-radius: 16px;
      transition: .22s
    }

    .th2 {
      position: absolute;
      width: 10px;
      height: 10px;
      top: 3px;
      left: 3px;
      background: #fff;
      border-radius: 50%;
      transition: .22s;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .4)
    }

    .tog input:checked~.tt {
      background: #2060ff
    }

    .tog input:checked~.th2 {
      transform: translateX(14px)
    }

    input[type=range].sl {
      -webkit-appearance: none;
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, .10);
      border-radius: 3px;
      outline: none;
      margin: 1px 0 0
    }

    input[type=range].sl::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      background: #4a8fff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 6px rgba(74, 143, 255, .5)
    }

    #btp {
      width: 100%;
      padding: 7px 6px;
      margin-bottom: 10px;
      background: rgba(40, 105, 255, .12);
      border: 1px solid rgba(40, 105, 255, .28);
      border-radius: 8px;
      color: #5a9eff;
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: .18s;
      -webkit-tap-highlight-color: transparent
    }

    #btp:hover {
      background: rgba(40, 105, 255, .24)
    }

    #spl {
      font-size: 9px;
      color: #2a60d0;
      text-align: right;
      margin: 4px 0 9px
    }

    .pl {
      border-top: 1px solid rgba(255, 255, 255, .055);
      padding-top: 8px;
      margin-top: 3px
    }

    .pl h3 {
      font-size: 8.5px;
      color: #2a3d58;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin: 0 0 6px
    }

    .pb {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      padding: 5px 6px;
      background: none;
      border: none;
      border-radius: 6px;
      color: #5878a0;
      font-size: 10px;
      cursor: pointer;
      transition: .14s;
      text-align: left;
      -webkit-tap-highlight-color: transparent
    }

    .pb:hover {
      background: rgba(255, 255, 255, .065);
      color: #b0ccec
    }

    .pb.act {
      background: rgba(40, 105, 255, .14);
      color: #7ab0f0
    }

    .pd {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0
    }

    #info {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      width: min(350px, calc(100% - 18px));
      background: rgba(0, 5, 18, .94);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(55, 125, 255, .22);
      border-radius: 16px;
      padding: 15px 17px 14px;
      z-index: 25;
      display: none;
      box-sizing: border-box
    }

    #info.show {
      display: block;
      animation: iup .28s cubic-bezier(.34, 1.2, .64, 1)
    }

    @keyframes iup {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(18px)
      }

      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0)
      }
    }

    .ih {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 3px
    }

    #idot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      flex-shrink: 0
    }

    #icn {
      font-size: 17px;
      font-weight: 700;
      color: #e8f0ff;
      letter-spacing: -.3px;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    #bclose {
      width: 26px;
      height: 26px;
      flex-shrink: 0;
      background: rgba(255, 255, 255, .07);
      border: none;
      border-radius: 50%;
      color: #5878a0;
      cursor: pointer;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: .15s;
      -webkit-tap-highlight-color: transparent
    }

    #bclose:hover {
      background: rgba(255, 255, 255, .15);
      color: #c0d8f4
    }

    #ict {
      font-size: 8.5px;
      color: #2a5898;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px
    }

    .ig {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px
    }

    .ii label {
      display: block;
      font-size: 7.5px;
      color: #2a3d58;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 2px
    }

    .ii span {
      font-size: 12px;
      color: #7aa8d8;
      font-weight: 600;
      letter-spacing: -.2px
    }

    #icdesc {
      font-size: 10px;
      color: #3d5570;
      line-height: 1.7;
      border-top: 1px solid rgba(255, 255, 255, .055);
      padding-top: 9px
    }

    #lbls {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 8
    }

    .lb {
      position: absolute;
      pointer-events: none;
      transform: translate(-50%, -100%);
      transition: opacity .3s
    }

    .lbname {
      background: rgba(0, 5, 18, .7);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, .09);
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 8.5px;
      color: #7898b8;
      letter-spacing: 1.2px;
      white-space: nowrap
    }

    .lbline {
      width: 1px;
      height: 11px;
      background: rgba(255, 255, 255, .15);
      margin: 0 auto
    }

    .lb.fc .lbname {
      border-color: rgba(80, 155, 255, .5);
      color: #b8d4ff
    }

    #ldg {
      position: absolute;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
      transition: opacity .7s
    }

    #ldg p {
      font-size: 11px;
      color: #2a60d0;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 18px
    }

    .sp {
      width: 30px;
      height: 30px;
      border: 1.5px solid rgba(42, 111, 255, .15);
      border-top-color: #4a8fff;
      border-radius: 50%;
      animation: spn .8s linear infinite
    }

    @keyframes spn {
      to {
        transform: rotate(360deg)
      }
    }

    #hint {
      position: absolute;
      bottom: 14px;
      left: 14px;
      font-size: 8.5px;
      color: rgba(50, 90, 150, .4);
      pointer-events: none;
      line-height: 1.7
    }

    @media(max-width:600px) {
      #panel {
        right: 58px;
        width: min(188px, calc(100% - 70px))
      }

      #info {
        bottom: 10px;
        width: calc(100% - 16px)
      }

      #hint {
        display: none
      }
    }
  </style>
</head>

<body style="margin:0;overflow:hidden;background:#000">

  <div id="sol">
    <canvas id="c"></canvas>
    <div id="lbls"></div>
    <button id="ptog">☰</button>
    <div id="panel">
      <h2 id="panel-title">☉ Hệ Mặt Trời</h2>
      <div id="lang-row">
        <button class="lbtn act" data-lang="vi">🇻🇳 VI</button>
        <button class="lbtn" data-lang="en">🇺🇸 EN</button>
      </div>
      <button id="btp">⏸ Dừng</button>
      <div class="cr"><span class="cl" id="lbl-speed">Tốc độ thời gian</span></div>
      <input type="range" class="sl" id="tsl" min="0.1" max="360" step="0.1" value="30">
      <div id="spl">30.0× speed</div>
      <div class="cr"><span class="cl" id="lbl-orbit">Quỹ đạo</span><label class="tog"><input type="checkbox" id="tor"
            checked>
          <div class="tt"></div>
          <div class="th2"></div>
        </label></div>
      <div class="cr"><span class="cl" id="lbl-labels">Nhãn</span><label class="tog"><input type="checkbox" id="tlb"
            checked>
          <div class="tt"></div>
          <div class="th2"></div>
        </label></div>
      <div class="cr"><span class="cl" id="lbl-stars">Ngôi sao</span><label class="tog"><input type="checkbox" id="tst"
            checked>
          <div class="tt"></div>
          <div class="th2"></div>
        </label></div>
      <div class="cr"><span class="cl" id="lbl-ast">Vành đai tiểu hành tinh</span><label class="tog"><input
            type="checkbox" id="tas" checked>
          <div class="tt"></div>
          <div class="th2"></div>
        </label></div>
      <div class="pl">
        <h3 id="lbl-focus">Theo dõi hành tinh</h3>
        <div id="plist"></div>
      </div>
    </div>
    <div id="info">
      <div class="ih">
        <div id="idot"></div>
        <h3 id="icn">—</h3><button id="bclose">✕</button>
      </div>
      <div id="ict">—</div>
      <div class="ig">
        <div class="ii"><label id="lbl-diam">Đường kính</label><span id="icd">—</span></div>
        <div class="ii"><label id="lbl-dist">Khoảng cách</label><span id="icdi">—</span></div>
        <div class="ii"><label id="lbl-period">Chu kỳ quỹ đạo</label><span id="icp">—</span></div>
        <div class="ii"><label id="lbl-moons">Vệ tinh</label><span id="icm">—</span></div>
      </div>
      <div id="icdesc">—</div>
    </div>
    <div id="ldg">
      <p id="ldg-txt">Hệ Mặt Trời</p>
      <div class="sp"></div>
    </div>
    <div id="hint">Kéo xoay · Cuộn phóng to/thu nhỏ tại con trỏ · Kéo phải di chuyển · Nhấp vào hành tinh</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    /* ── Language strings ─────────────────────────────────────────────── */
    const LANGS = {
      vi: {
        solarSystem: 'Hệ Mặt Trời', pause: '⏸ Dừng', resume: '▶ Tiếp tục', timeSpeed: 'Tốc độ thời gian',
        orbitLines: 'Quỹ đạo', labels: 'Nhãn', stars: 'Ngôi sao', asteroidBelt: 'Vành đai tiểu hành tinh',
        focusPlanet: 'Theo dõi hành tinh', loading: 'Hệ Mặt Trời',
        hint: 'Kéo xoay · Cuộn phóng to/thu nhỏ tại con trỏ · Kéo phải di chuyển · Nhấp vào hành tinh',
        lblDiam: 'Đường kính', lblDist: 'Khoảng cách', lblPeriod: 'Chu kỳ quỹ đạo', lblMoons: 'Vệ tinh', days: 'ngày', yrs: 'năm'
      },
      en: {
        solarSystem: 'Solar System', pause: '⏸ Pause', resume: '▶ Resume', timeSpeed: 'Time Speed',
        orbitLines: 'Orbit Lines', labels: 'Labels', stars: 'Stars', asteroidBelt: 'Asteroid Belt',
        focusPlanet: 'Focus Planet', loading: 'Solar System',
        hint: 'Drag · Scroll zoom at cursor · Right-drag pan · Click planet',
        lblDiam: 'Diameter', lblDist: 'Distance', lblPeriod: 'Orbital Period', lblMoons: 'Moons', days: 'days', yrs: 'yrs'
      }
    };
    let currentLang = 'vi';

    /* ── Planet data ──────────────────────────────────────────────────── */
    const PD = [
      {
        id: 'mercury', name: 'Mercury', nameVi: 'Sao Thủy', type: 'Terrestrial Planet', typeVi: 'Hành tinh đất đá',
        color: '#b0a89a', radius: .38, orbitR: 7.8, period: 88, rotP: 58.6, tilt: .034, diam: '4,879 km', dist: '0.39 AU', moons: '0',
        desc: 'Smallest and fastest planet with virtually no atmosphere. Temperatures swing from −180°C to 430°C.',
        descVi: 'Hành tinh nhỏ và nhanh nhất, gần như không có khí quyển. Nhiệt độ dao động từ −180°C đến 430°C do gần Mặt Trời và thiếu lớp cách nhiệt.'
      },
      {
        id: 'venus', name: 'Venus', nameVi: 'Sao Kim', type: 'Terrestrial Planet', typeVi: 'Hành tinh đất đá',
        color: '#e8c860', radius: .92, orbitR: 12, period: 225, rotP: -243, tilt: 177.4, diam: '12,104 km', dist: '0.72 AU', moons: '0',
        desc: 'Hottest planet despite not being closest to the Sun. Dense CO₂ atmosphere drives surface temperatures to 465°C.',
        descVi: 'Hành tinh nóng nhất dù không gần Mặt Trời nhất. Khí quyển CO₂ dày đặc tạo hiệu ứng nhà kính mất kiểm soát, đẩy nhiệt độ bề mặt lên 465°C.'
      },
      {
        id: 'earth', name: 'Earth', nameVi: 'Trái Đất', type: 'Terrestrial Planet', typeVi: 'Hành tinh đất đá',
        color: '#4a9ae0', radius: 1, orbitR: 17, period: 365, rotP: 1, tilt: 23.5, diam: '12,742 km', dist: '1.00 AU', moons: '1',
        desc: "Our home — the only known planet with life. Oceans cover 71% of the surface and a nitrogen-oxygen atmosphere shields life from the Sun's harmful radiation.",
        descVi: 'Ngôi nhà của chúng ta — hành tinh duy nhất được biết có sự sống. Đại dương bao phủ 71% bề mặt, bầu khí quyển nitrogen-oxy bảo vệ sự sống khỏi bức xạ Mặt Trời.',
        hasMoon: true, hasAtmo: true
      },
      {
        id: 'mars', name: 'Mars', nameVi: 'Sao Hỏa', type: 'Terrestrial Planet', typeVi: 'Hành tinh đất đá',
        color: '#d04820', radius: .53, orbitR: 23, period: 687, rotP: 1.03, tilt: 25.2, diam: '6,779 km', dist: '1.52 AU', moons: '2',
        desc: 'The Red Planet, home to Olympus Mons — 22 km tall, the highest volcano in the solar system. A primary target for future human exploration.',
        descVi: 'Hành tinh Đỏ, nơi có Olympus Mons cao 22 km — núi lửa cao nhất hệ Mặt Trời. Mục tiêu hàng đầu cho cuộc thám hiểm của con người trong tương lai.'
      },
      {
        id: 'jupiter', name: 'Jupiter', nameVi: 'Sao Mộc', type: 'Gas Giant', typeVi: 'Hành tinh khí khổng lồ',
        color: '#d09858', radius: 2.8, orbitR: 34, period: 4333, rotP: .41, tilt: 3.1, diam: '139,820 km', dist: '5.2 AU', moons: '95',
        desc: 'Largest planet in our solar system. The Great Red Spot is a storm wider than Earth raging for centuries. Its 95 moons form a mini solar system.',
        descVi: 'Hành tinh lớn nhất hệ Mặt Trời. Vết Đỏ Lớn là cơn bão rộng hơn Trái Đất, tồn tại hàng thế kỷ. 95 mặt trăng của nó tạo thành một hệ Mặt Trời thu nhỏ.'
      },
      {
        id: 'saturn', name: 'Saturn', nameVi: 'Sao Thổ', type: 'Gas Giant', typeVi: 'Hành tinh khí khổng lồ',
        color: '#e8d870', radius: 2.3, orbitR: 46, period: 10759, rotP: .44, tilt: 26.7, diam: '116,460 km', dist: '9.58 AU', moons: '146',
        desc: 'The jewel of the solar system. Its rings span 280,000 km yet are only ~10 m thick — billions of ice and rock particles in breathtaking formation.',
        descVi: 'Viên ngọc quý của hệ Mặt Trời. Các vành đai trải rộng 280.000 km nhưng chỉ dày ~10 m — hàng tỷ mảnh băng và đá trong đội hình ngoạn mục.',
        hasRings: true
      },
      {
        id: 'uranus', name: 'Uranus', nameVi: 'Sao Thiên Vương', type: 'Ice Giant', typeVi: 'Hành tinh băng khổng lồ',
        color: '#68d8d8', radius: 1.7, orbitR: 58, period: 30687, rotP: -.72, tilt: 97.77, diam: '50,724 km', dist: '19.2 AU', moons: '27',
        desc: 'Tilted 98° on its axis, Uranus literally rolls around the Sun. Its aquamarine colour comes from methane absorbing red wavelengths. Discovered 1781.',
        descVi: 'Nghiêng 98° trên trục, Sao Thiên Vương thực sự lăn xung quanh Mặt Trời. Màu xanh ngọc đến từ khí methane hấp thụ ánh sáng đỏ. Phát hiện năm 1781.'
      },
      {
        id: 'neptune', name: 'Neptune', nameVi: 'Sao Hải Vương', type: 'Ice Giant', typeVi: 'Hành tinh băng khổng lồ',
        color: '#3858e8', radius: 1.65, orbitR: 70, period: 60190, rotP: .67, tilt: 28.3, diam: '49,244 km', dist: '30.1 AU', moons: '16',
        desc: 'Windiest planet with storms reaching 2,100 km/h. Predicted mathematically before being observed through a telescope in 1846.',
        descVi: 'Hành tinh có gió mạnh nhất với bão đạt 2.100 km/h. Được dự đoán bằng toán học trước khi quan sát qua kính thiên văn năm 1846 — kỳ tích của thiên văn học.'
      },
    ];

    /* ── State ────────────────────────────────────────────────────────── */
    let paused = false, timeScale = 30, showOrbits = true, showLabels = true, showStars = true, showAst = true;
    let focusedIdx = null, lastInteract = Date.now(), clickSX = 0, clickSY = 0;

    /* ── Renderer / Scene / Camera ────────────────────────────────────── */
    const APP = document.getElementById('sol'), CV = document.getElementById('c');
    let W = APP.clientWidth, H = APP.clientHeight;
    const renderer = new THREE.WebGLRenderer({ canvas: CV, antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(W, H);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.12;
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(55, W / H, .1, 2000);
    camera.position.set(0, 42, 92);
    scene.add(new THREE.AmbientLight(0x08122a, 2.4));

      g.setAttribute('color', new THREE.BufferAttribute(col, 3));
      g.setAttribute('size', new THREE.BufferAttribute(sz, 1));
      return new THREE.Points(g, new THREE.PointsMaterial({ vertexColors: true, sizeAttenuation: false, size: 1.1, transparent: true, opacity: .92 }));
    }
    const stars = mkStars(); scene.add(stars);

    /* ── Sun ──────────────────────────────────────────────────────────── */
    const sunMat = new THREE.ShaderMaterial({
      uniforms: { time: { value: 0 } },
      vertexShader: `varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
      fragmentShader: `uniform float time;varying vec2 vUv;
float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float n(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);}
float fbm(vec2 p){float v=0.,a=.5;mat2 m=mat2(.8,.6,-.6,.8);for(int i=0;i<6;i++){v+=a*n(p);p=m*p*2.05+vec2(.28);a*=.5;}return v;}
void main(){vec2 uv=vUv*5.2+vec2(time*.055,time*.022);float n1=fbm(uv),n2=fbm(uv+vec2(n1*1.9,.0)+vec2(.0,time*.048));float f=fbm(uv+vec2(n1,n2));
vec3 c1=vec3(1.,.975,.28),c2=vec3(1.,.44,.04),c3=vec3(.7,.055,.0);vec3 col=mix(c1,c2,f);col=mix(col,c3,pow(f,2.3)*.48);
float d=length(vUv-.5)*2.;col*=1.-.25*pow(clamp(d,0.,1.),.4);col+=vec3(.14,.05,.0)*pow(max(0.,1.-d*1.35),2.8);gl_FragColor=vec4(col,1.);}`
    });
    const sun = new THREE.Mesh(new THREE.SphereGeometry(4, 64, 64), sunMat); scene.add(sun);
    const glowTex = mkGlowTex();
    [[25, .94], [46, .40], [82, .16], [140, .055]].forEach(([s, o]) => {
      const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTex, blending: THREE.AdditiveBlending, transparent: true, opacity: o, depthWrite: false }));
      sp.scale.setScalar(s); scene.add(sp);
    });

    /* ── Orbit lines ──────────────────────────────────────────────────── */
    const orbitLines = [];
    PD.forEach(pd => {
      const pts = [];
      for (let i = 0; i <= 128; i++) { const a = i / 128 * 6.2832; pts.push(new THREE.Vector3(Math.cos(a) * pd.orbitR, 0, Math.sin(a) * pd.orbitR)); }
      const l = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), new THREE.LineBasicMaterial({ color: 0x0d2040, transparent: true, opacity: .55 }));
      scene.add(l); orbitLines.push(l);
    });

    /* ── Planets + hitbox spheres ─────────────────────────────────────── */
    const planets = [], lblsEl = document.getElementById('lbls'), dummy = new THREE.Object3D(), ringTex = mkRingTex();
    const hitMat = new THREE.MeshBasicMaterial({ visible: false, side: THREE.FrontSide });

    PD.forEach(d => {
      const pivot = new THREE.Object3D(); pivot.rotation.y = Math.random() * 6.283; scene.add(pivot);
      const cont = new THREE.Object3D(); cont.position.x = d.orbitR; pivot.add(cont);
      const tilt = new THREE.Object3D(); tilt.rotation.z = d.tilt * Math.PI / 180; cont.add(tilt);

      /* Visible planet mesh */
      const mat = new THREE.MeshPhongMaterial({
        map: mkTex(d.id),
        shininess: d.id === 'earth' ? 20 : d.id === 'mercury' ? 9 : d.id === 'uranus' || d.id === 'neptune' ? 14 : 5,
        specular: new THREE.Color(d.id === 'earth' ? 0x1a2d44 : 0x080808)
      });
      const mesh = new THREE.Mesh(new THREE.SphereGeometry(d.radius, 64, 64), mat);
      tilt.add(mesh);

      /* Atmosphere (Earth only) */
      if (d.hasAtmo) {
        cont.add(new THREE.Mesh(new THREE.SphereGeometry(d.radius * 1.08, 32, 32), new THREE.MeshPhongMaterial({ color: 0x2a72ff, transparent: true, opacity: .10, side: THREE.BackSide })));
        cont.add(new THREE.Mesh(new THREE.SphereGeometry(d.radius * 1.03, 32, 32), new THREE.MeshPhongMaterial({ color: 0x1a55ff, transparent: true, opacity: .035, side: THREE.FrontSide })));
      }

      /* Saturn rings */
      if (d.hasRings) {
        const rm = new THREE.MeshBasicMaterial({ map: ringTex, side: THREE.DoubleSide, transparent: true, opacity: 1, depthWrite: false });
        const rg = new THREE.Mesh(new THREE.RingGeometry(d.radius * RING_IR, d.radius * RING_OR, 128, 1), rm);
        rg.rotation.x = Math.PI / 2; tilt.add(rg);
      }

      /* Moon (Earth) */
      let moonPivot = null;
      if (d.hasMoon) {
        moonPivot = new THREE.Object3D(); cont.add(moonPivot);
        const mm = new THREE.Mesh(new THREE.SphereGeometry(.27, 32, 32), new THREE.MeshPhongMaterial({ map: mkTex('moon'), shininess: 5 }));
        mm.position.x = 1.92; moonPivot.add(mm);
      }

      /* ★ Invisible hitbox — larger than the visual planet for easier clicking */
      const hitRadius = Math.max(d.radius * 2.0, 1.1);  // minimum 1.1 units for small planets
      const hitMesh = new THREE.Mesh(new THREE.SphereGeometry(hitRadius, 12, 12), hitMat);
      cont.add(hitMesh); // parented to cont (not tilt) so it stays centred

      /* Label */
      const lbl = document.createElement('div'); lbl.className = 'lb';
      const line = document.createElement('div'); line.className = 'lbline';
      const nameEl = document.createElement('div'); nameEl.className = 'lbname'; nameEl.textContent = d.nameVi;
      lbl.appendChild(line); lbl.appendChild(nameEl); lblsEl.appendChild(lbl);

      planets.push({ d, pivot, cont, tilt, mesh, hitMesh, moonPivot, lbl, nameEl, angle: pivot.rotation.y });
    });

    /* ── Planet list in panel ─────────────────────────────────────────── */
    const plist = document.getElementById('plist');
    PD.forEach((d, i) => {
      const b = document.createElement('button'); b.className = 'pb';
      b.innerHTML = `<div class="pd" style="background:${d.color}"></div><span class="pname">${d.nameVi}</span>`;
      b.onclick = () => { focusPlanet(i); lastInteract = Date.now(); };
      plist.appendChild(b);
    });

    /* ── Asteroid belt ────────────────────────────────────────────────── */
    const AST = 1800, astMesh = new THREE.InstancedMesh(new THREE.SphereGeometry(.055, 5, 4), new THREE.MeshPhongMaterial({ color: 0x6a6050, shininess: 2 }), AST), astData = [];
    for (let i = 0; i < AST; i++) {
      const a = Math.random() * 6.283, r = 27 + Math.random() * 5.2, y = (Math.random() - .5) * 1.5, sc = .2 + Math.random() * .8;
      dummy.position.set(Math.cos(a) * r, y, Math.sin(a) * r); dummy.rotation.set(Math.random() * 6, Math.random() * 6, Math.random() * 6); dummy.scale.setScalar(sc); dummy.updateMatrix();
      astMesh.setMatrixAt(i, dummy.matrix); astData.push({ a, r, y, spd: (.00007 + Math.random() * .00013) * (Math.random() > .5 ? 1 : -1), sc });
    }
    astMesh.instanceMatrix.needsUpdate = true; scene.add(astMesh);

    /* ── Info panel helpers ───────────────────────────────────────────── */
    const tmpV = new THREE.Vector3();

    function showInfo(p) {
      const d = p.d, t = LANGS[currentLang];
      document.getElementById('icn').textContent = currentLang === 'vi' ? d.nameVi : d.name;
      document.getElementById('ict').textContent = currentLang === 'vi' ? d.typeVi : d.type;
      document.getElementById('icd').textContent = d.diam;
      document.getElementById('icdi').textContent = d.dist;
      document.getElementById('icp').textContent = d.period < 365 ? d.period + ' ' + t.days : (d.period / 365).toFixed(1) + ' ' + t.yrs;
      document.getElementById('icm').textContent = d.moons;
      document.getElementById('icdesc').textContent = currentLang === 'vi' ? d.descVi : d.desc;
      document.getElementById('idot').style.cssText = `width:11px;height:11px;border-radius:50%;flex-shrink:0;background:${d.color};box-shadow:0 0 8px ${d.color}88`;
      const el = document.getElementById('info'); el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
      if (window.innerWidth <= 640 && panelOpen) { panelOpen = false; syncPanel(); }
    }

    function focusPlanet(idx) {
      focusedIdx = idx;
      const p = planets[idx];
      p.cont.getWorldPosition(tmpV);
      cam.focusOn(tmpV, p.d.radius * 11 + 5);
      showInfo(p);
      planets.forEach((q, qi) => {
        q.lbl.classList.toggle('fc', qi === idx);
        const b = plist.querySelectorAll('.pb')[qi];
        if (b) b.classList.toggle('act', qi === idx);
      });
    }

    function unfocus() {
      if (focusedIdx === null) return;
      focusedIdx = null;
      cam.reset();
      document.getElementById('info').classList.remove('show');
      planets.forEach((p, i) => {
        p.lbl.classList.remove('fc');
        const b = plist.querySelectorAll('.pb')[i];
        if (b) b.classList.remove('act');
      });
    }

    document.getElementById('bclose').onclick = () => { unfocus(); lastInteract = Date.now(); };

    /* ── Language switching ───────────────────────────────────────────── */
    const btp = document.getElementById('btp');
    function applyLang(lang) {
      currentLang = lang; const t = LANGS[lang];
      document.getElementById('panel-title').textContent = '☉ ' + t.solarSystem;
      btp.textContent = paused ? t.resume : t.pause;
      document.getElementById('lbl-speed').textContent = t.timeSpeed;
      document.getElementById('lbl-orbit').textContent = t.orbitLines;
      document.getElementById('lbl-labels').textContent = t.labels;
      document.getElementById('lbl-stars').textContent = t.stars;
      document.getElementById('lbl-ast').textContent = t.asteroidBelt;
      document.getElementById('lbl-focus').textContent = t.focusPlanet;
      document.getElementById('hint').textContent = t.hint;
      document.getElementById('ldg-txt').textContent = t.loading;
      document.getElementById('lbl-diam').textContent = t.lblDiam;
      document.getElementById('lbl-dist').textContent = t.lblDist;
      document.getElementById('lbl-period').textContent = t.lblPeriod;
      document.getElementById('lbl-moons').textContent = t.lblMoons;
      planets.forEach((p, i) => {
        const nm = lang === 'vi' ? PD[i].nameVi : PD[i].name;
        p.nameEl.textContent = nm;
        const b = plist.querySelectorAll('.pb')[i];
        if (b) b.querySelector('.pname').textContent = nm;
      });
      document.querySelectorAll('.lbtn').forEach(b => b.classList.toggle('act', b.dataset.lang === lang));
      if (focusedIdx !== null) showInfo(planets[focusedIdx]);
    }
    document.querySelectorAll('.lbtn').forEach(b => { b.onclick = () => { applyLang(b.dataset.lang); lastInteract = Date.now(); }; });

    /* ── Panel toggle ─────────────────────────────────────────────────── */
    const panelEl = document.getElementById('panel'), ptogEl = document.getElementById('ptog');
    let panelOpen = window.innerWidth > 640;
    function syncPanel() { panelEl.classList.toggle('hide', !panelOpen); ptogEl.textContent = panelOpen ? '✕' : '☰'; }
    syncPanel();
    ptogEl.addEventListener('click', () => { panelOpen = !panelOpen; syncPanel(); lastInteract = Date.now(); });

    /* ── Controls ─────────────────────────────────────────────────────── */
    btp.onclick = () => { paused = !paused; btp.textContent = paused ? LANGS[currentLang].resume : LANGS[currentLang].pause; lastInteract = Date.now(); };
    const tsl = document.getElementById('tsl'), spl = document.getElementById('spl');
    tsl.oninput = () => { timeScale = +tsl.value; spl.textContent = (+tsl.value).toFixed(1) + '× speed'; lastInteract = Date.now(); };
    document.getElementById('tor').onchange = e => { showOrbits = e.target.checked; orbitLines.forEach(l => l.visible = showOrbits); };
    document.getElementById('tlb').onchange = e => { showLabels = e.target.checked; lblsEl.style.opacity = showLabels ? 1 : 0; };
    document.getElementById('tst').onchange = e => { showStars = e.target.checked; stars.visible = showStars; };
    document.getElementById('tas').onchange = e => { showAst = e.target.checked; astMesh.visible = showAst; };

    /* ── Resize ───────────────────────────────────────────────────────── */
    new ResizeObserver(([e]) => {
      W = e.contentRect.width; H = e.contentRect.height;
      renderer.setSize(W, H); camera.aspect = W / H; camera.updateProjectionMatrix();
    }).observe(APP);

    /* ── Label projection ─────────────────────────────────────────────── */
    function updateLabels() {
      planets.forEach(p => {
        p.cont.getWorldPosition(tmpV);
        const proj = tmpV.clone().project(camera);
        const x = (proj.x * .5 + .5) * W, y = (-proj.y * .5 + .5) * H;
        const off = Math.max(20, p.d.radius * 26 / cam.r * H * .5);
        if (proj.z < 1 && proj.z > -1) { p.lbl.style.cssText = `left:${x}px;top:${y - off}px;opacity:1`; }
        else p.lbl.style.opacity = '0';
      });
    }

    /* ── Animation loop ───────────────────────────────────────────────── */
    const clock = new THREE.Clock(); let totalT = 0;
    setTimeout(() => { const l = document.getElementById('ldg'); l.style.opacity = '0'; setTimeout(() => l.style.display = 'none', 700); }, 950);

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta(), eff = paused ? 0 : dt * timeScale;
      totalT += dt; sunMat.uniforms.time.value = totalT; sun.rotation.y += dt * .015;

      if (Date.now() - lastInteract > 9000 && focusedIdx === null) cam.tTheta += .00022;

      planets.forEach((p, pi) => {
        p.angle += eff * (365 / p.d.period) * .002; p.pivot.rotation.y = p.angle;
        p.mesh.rotation.y += eff * (1 / Math.abs(p.d.rotP) * .055) * (p.d.rotP < 0 ? -1 : 1);
        if (p.moonPivot) p.moonPivot.rotation.y += eff * .031;
        if (focusedIdx === pi) { p.cont.getWorldPosition(tmpV); cam.tTarget.lerp(tmpV, .09); }
      });

      if (showAst) {
        astData.forEach((a, i) => {
          a.a += eff * a.spd;
          dummy.position.set(Math.cos(a.a) * a.r, a.y, Math.sin(a.a) * a.r);
          dummy.rotation.y += eff * .002; dummy.scale.setScalar(a.sc); dummy.updateMatrix();
          astMesh.setMatrixAt(i, dummy.matrix);
        });
        astMesh.instanceMatrix.needsUpdate = true;
      }

      cam.update();
      if (showLabels) updateLabels();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>

</html>
